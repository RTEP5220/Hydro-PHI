[tof_sensor]
i2c_bus          = 1           # /dev/i2c-1 on Raspberry Pi 5
i2c_address      = 0x29        # VL53L1X default I2C address
baseline_cm      = 30.0        # Auto-calibrated at startup (no container present)
rim_detect_delta = 3.0         # Min cm drop from baseline to confirm container rim
safety_margin_cm = 1.5         # Gap left below rim as fill stop point
poll_interval_ms = 100         # ToF sensor thread cadence (ms)

[load_cell]
data_pin            = 5        # HX711 DOUT — lgpio GPIO pin
clock_pin           = 6        # HX711 PD_SCK — lgpio GPIO pin
calibration_factor  = 420.0    # ADC units per gram — calibrate on first run
poll_interval_ms    = 80       # Load cell thread cadence (ms)
weight_delta_g      = 1.0      # Max weight change per cycle to count as stable
stable_cycles       = 6        # Stable cycles required to confirm full
present_threshold_g = 10.0     # Minimum weight (g) to confirm container on scale

[ir_proximity]
gpio_pin  = 16                 # Digital IR proximity sensor GPIO pin
active_low = true              # LOW = container present (most IR modules)

[actuator]
# Peristaltic pump only — solenoid removed. Tube self-seals on motor stop.
pump_pin  = 22                 # Relay GPIO for peristaltic pump motor
# GPIO 23 is free — available for nozzle servo, drip tray, etc.

[controller]
fill_timeout_s = 60            # Abort fill if it exceeds this duration (seconds)
idle_scan_ms   = 50            # Controller loop period in ms (all states)

[threads]
# SCHED_FIFO priorities — higher number = higher RT priority (max 99)
# v6: these are ENFORCED — process aborts if any RT priority cannot be set.
sensor_priority     = 80       # ToF + LoadCell sensor threads
safety_priority     = 90       # IR lgpio alert thread (managed by lgpio)
controller_priority = 70       # Controller state machine thread
# worker runs at controller_priority - 10 = 60 (set programmatically)
logger_priority     = 0        # Logger: SCHED_OTHER (non-RT by design)

[logging]
enable     = true
log_file   = /var/log/smartflow/fill_log.csv
log_level  = INFO              # DEBUG, INFO, WARN, ERROR
queue_size = 256               # Async log queue depth (entries)
